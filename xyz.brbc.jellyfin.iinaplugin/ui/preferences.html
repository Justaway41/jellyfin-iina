<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jellyfin Preferences</title>
</head>
<body>
    <div class="pref-section">
        <label>
            <input type="checkbox" data-type="bool" data-pref-key="skipSegmentsEnabled" />
            Enable Skip Intro/Credits overlay
        </label>
        <p class="small secondary pref-help">
            Shows a skip button for intro and credits segments during episode playback.
        </p>
    </div>
</body>
</html>
