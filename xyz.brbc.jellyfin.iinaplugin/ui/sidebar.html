<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="view">
        <div class="login-container">
            <img class="login-logo" src="assets/jellyfin-horizontal.png" alt="Jellyfin">
            <form id="login-form">
                <div class="form-group">
                    <label for="server-url">Server URL</label>
                    <input type="url" id="server-url" placeholder="https://jellyfin.example.com" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password">
                </div>
                <button type="submit" class="btn-primary" id="connect-btn">Connect</button>
                <div id="login-error" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Main Browse View -->
    <div id="browse-view" class="view hidden">
        <header class="status-header">
            <div class="status-brand">
                <div class="jellyfin-logo" aria-hidden="true"></div>
                <div class="status-text">
                    <div id="server-name" class="server-name"></div>
                    <div class="server-details">
                        <span id="server-host"></span>
                        <span class="separator">•</span>
                        <span id="user-name"></span>
                    </div>
                </div>
            </div>
            <div class="status-actions">
                <button id="refresh-btn" class="btn-icon" data-clickable title="Home">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 2.2L2 7.2v6.6h4.2V9.4h3.6v4.4H14V7.2L8 2.2z"/>
                    </svg>
                </button>
                <button id="logout-btn" class="btn-icon" data-clickable title="Sign Out">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M6 2v2H3v8h3v2H1V2h5zm4 3l4 3-4 3V9H5V7h5V5z"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="search-bar">
            <input type="search" id="search-input" placeholder="Search movies and shows" autocomplete="off">
            <button id="clear-search" class="btn-icon hidden" data-clickable title="Clear search">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div id="section-header" class="section-header">
            <button id="back-btn" class="btn-icon hidden" data-clickable title="Back">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M11 2L5 8l6 6" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </button>
            <h2 id="section-title">Up Next</h2>
        </div>

        <!-- Content Area -->
        <div id="content" class="content">
            <!-- Dynamically populated -->
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>

        <!-- Error State -->
        <div id="error-state" class="error-state hidden">
            <p id="error-message"></p>
            <button id="retry-btn" class="btn-secondary" data-clickable>Retry</button>
        </div>
    </div>

    <script src="dist/sidebar.js"></script>
</body>
</html>
