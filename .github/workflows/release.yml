name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin archive
        run: |
          zip -r ../xyz.brbc.jellyfin.iinaplugin.iinaplgz .
        working-directory: xyz.brbc.jellyfin.iinaplugin

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: xyz.brbc.jellyfin.iinaplugin.iinaplgz
          token: ${{ secrets.JELLYFIN_IINA_TOKEN }}
