name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Verify built client version
        run: |
          bun -e 'const fs=require("fs");
          const info=JSON.parse(fs.readFileSync("xyz.brbc.jellyfin.iinaplugin/Info.json","utf8"));
          const version=info.version;
          const escapeRegExp=(value)=>value.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
          const pattern=new RegExp(`CLIENT_VERSION\\s*=\\s*"${escapeRegExp(version)}"`);
          const files=[
            "xyz.brbc.jellyfin.iinaplugin/dist/main.js",
            "xyz.brbc.jellyfin.iinaplugin/dist/global.js",
            "xyz.brbc.jellyfin.iinaplugin/ui/dist/sidebar.js"
          ];
          let ok=true;
          for (const file of files) {
            const content=fs.readFileSync(file,"utf8");
            if (!pattern.test(content)) {
              console.error(`Version mismatch in ${file}; expected ${version}`);
              ok=false;
            }
          }
          if (!ok) process.exit(1);'

      - name: Create plugin archive
        run: |
          zip -r ../xyz.brbc.jellyfin.iinaplugin.iinaplgz .
        working-directory: xyz.brbc.jellyfin.iinaplugin

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: xyz.brbc.jellyfin.iinaplugin.iinaplgz
          token: ${{ secrets.JELLYFIN_IINA_TOKEN }}
